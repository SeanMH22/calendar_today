<div class="form-group">
    <label for="calendarURL" class="form-label">Calendar URL (iCal / .ics)</label>
    <input
        type="url"
        id="calendarURL"
        name="calendarURL"
        placeholder="https://calendar.google.com/calendar/ical/…/basic.ics"
        required
        class="form-input"
    >
    <small class="form-hint">Paste your Google Calendar, Apple Calendar or any iCal feed URL here.</small>
</div>

<div class="form-group">
    <label for="bomStationId" class="form-label">BOM Weather Station (Optional)</label>
    <input
        type="text"
        id="bomStationId"
        name="bomStationId"
        placeholder="94768 or full URL"
        class="form-input"
    >
    <small class="form-hint">
        Display weather when no events. Use station ID (NSW: 94768 Sydney, 66078 Orange) or full BOM JSON URL for other states.
        <a href="http://www.bom.gov.au/nsw/observations/map.shtml" target="_blank">NSW</a> |
        <a href="http://www.bom.gov.au/vic/observations/map.shtml" target="_blank">VIC</a> |
        <a href="http://www.bom.gov.au/qld/observations/map.shtml" target="_blank">QLD</a> |
        <a href="http://www.bom.gov.au/wa/observations/map.shtml" target="_blank">WA</a>
    </small>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (loadPluginSettings) {
            document.getElementById('calendarURL').value = pluginSettings.calendarURL || '';
            document.getElementById('bomStationId').value = pluginSettings.bomStationId || '';
        }
    });
</script>
