<div class="form-group">
    <label for="calendarURL" class="form-label">Calendar URL (iCal / .ics)</label>
    <input
        type="url"
        id="calendarURL"
        name="calendarURL"
        placeholder="https://calendar.google.com/calendar/ical/…/basic.ics"
        required
        class="form-input"
    >
    <small class="form-hint">Paste your Google Calendar, Apple Calendar or any iCal feed URL here.</small>
</div>

<div class="form-group">
    <label for="bomStationId" class="form-label">BOM Weather Station ID (Optional)</label>
    <input
        type="text"
        id="bomStationId"
        name="bomStationId"
        placeholder="94768"
        class="form-input"
    >
    <small class="form-hint">
        Display weather when no events. Common IDs: Sydney (94768), Melbourne (95936), Brisbane (94576), Perth (94610), Adelaide (94672), Canberra (94926).
        <a href="http://www.bom.gov.au/nsw/observations/map.shtml" target="_blank">Find your station ID</a>
    </small>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (loadPluginSettings) {
            document.getElementById('calendarURL').value = pluginSettings.calendarURL || '';
            document.getElementById('bomStationId').value = pluginSettings.bomStationId || '';
        }
    });
</script>
